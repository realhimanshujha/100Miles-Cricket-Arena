<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>100 Miles Arena | Admin Login</title>

<link rel="stylesheet" href="css/admin.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="login-bg"></div>

<div class="login-container">

    <div class="login-card">

        <div class="logo-box">

            <img src="../assets/images/logo.jpeg" alt="100 Miles Arena">

        </div>

        <span class="admin-tag">

            ADMIN PANEL

        </span>

        <h1>

            Welcome Back

        </h1>

        <p>

            Sign in to manage bookings, customers, loyalty rewards and memberships.

        </p>

        <form id="loginForm">

            <div class="input-box">

                <i class="fa-solid fa-user"></i>

                <input
                type="text"
                id="username"
                placeholder="Username"
                autocomplete="off"
                required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                type="password"
                id="password"
                placeholder="Password"
                required>

                <i class="fa-solid fa-eye eye-toggle"
                id="togglePassword"></i>

            </div>

            <button
            type="submit"
            class="login-btn">

                Login

            </button>

        </form>

        <div class="login-footer">

            <p>

                © 2026 100 Miles Cricket Arena

            </p>

        </div>

    </div>

</div>

<script src="js/admin.js"></script>

</body>

</html>
